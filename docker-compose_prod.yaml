version: "3.9"

services:

  redis_server:
    image: redis:7.4-alpine
    container_name: redis_server
    restart: always
    ports:
      - "6379:6379"
    # IMPORTANT: ${REDIS_PASSWORD} in `command` is substituted from the SHELL at
    # "docker compose up" time (not from env_file).
    # Always run: docker compose -f docker-compose_prod.yaml --env-file service.prod.env up -d
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    # env_file injects REDIS_PASSWORD into the container so the healthcheck
    # CMD-SHELL can read it at runtime (avoids the shell-substitution problem).
    env_file:
      - ./service.prod.env
    volumes:
      - redis_data:/data
    networks:
      - fleet-network
    healthcheck:
      # CMD-SHELL resolves $REDIS_PASSWORD from the container environment at
      # runtime — safe even when docker compose is run without --env-file.
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD --no-auth-warning ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  service_manager:
    image: dheerajkumarp/fleet_service_manager:latest
    container_name: service_manager
    restart: on-failure:3
    # All runtime config comes from service.prod.env, written by deploy.yaml
    # from GitHub Actions secrets. Do NOT add ${VAR} substitutions here —
    # they resolve from the shell at "docker compose up" time, not from the
    # env_file, and will be empty strings when run over SSH.
    env_file:
      - ./service.prod.env
    environment:
      # Migrations handled by the migrate_prod init container
      - RUN_MIGRATIONS_ON_STARTUP=false
    volumes:
      # Mount Firebase service account key (host → container)
      - ./app/firebase/firebase_key.json:/app/app/firebase/firebase_key.json:ro

      # Persistent storage for uploaded data
      - /var/lib/fleet/storage:/var/lib/fleet/storage

      # Legacy uploads path (remove if unused)
      - /var/lib/fleet/uploads:/app/uploaded_files

    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis_server:
        condition: service_healthy
      migrate_prod:
        condition: service_completed_successfully
    ports:
      - "8100:8000"      # public port for service_manager
    networks:
      - fleet-network

  migrate_prod:
    image: dheerajkumarp/fleet_service_manager:latest
    container_name: fleet_migrate_prod
    command: ["alembic", "upgrade", "head"]
    env_file:
      - ./service.prod.env
    depends_on:
      redis_server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fleet-network
    restart: "no"

networks:
  fleet-network:
    driver: bridge

volumes:
  redis_data:
