name: Deploy Fleet Manager

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
      remove_images:
        description: "Remove Docker images before deployment"
        required: false
        default: true
        type: boolean
      remove_volumes:
        description: "Remove Docker volumes (will reset database)"
        required: false
        default: false
        type: boolean

env:
  IMAGE_TAG: latest
  STACK_NAME: fleet-service_manager

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      # 2️⃣ Set environment (prod/staging/dev)
      - name: Set environment based on branch
        id: set_env
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            echo "ENV=prod"                    >> $GITHUB_ENV
            echo "IMAGE_TAG=latest"            >> $GITHUB_ENV
            echo "CONTAINER_NAME=service_manager" >> $GITHUB_ENV
          elif [ "$BRANCH" = "staging" ]; then
            echo "ENV=staging"                       >> $GITHUB_ENV
            echo "IMAGE_TAG=staging"                 >> $GITHUB_ENV
            echo "CONTAINER_NAME=service_manager_staging" >> $GITHUB_ENV
          elif [[ "$BRANCH" == dev-* ]]; then
            echo "ENV=dev"                        >> $GITHUB_ENV
            echo "IMAGE_TAG=dev"                  >> $GITHUB_ENV
            echo "CONTAINER_NAME=service_manager_dev" >> $GITHUB_ENV
          else
            echo "Invalid branch: $BRANCH"
            exit 1
          fi

      # 3️⃣ Docker login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build & push Docker image
      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                   # root of repo where Dockerfile is
          file: ./Dockerfile           # path to Dockerfile
          push: true
          tags: dheerajkumarp/fleet_service_manager:${{ env.IMAGE_TAG }}

      # 5️⃣ Copy docker-compose files and scripts to VPS
      - name: Copy docker-compose files and scripts to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "docker-compose_${{ env.ENV }}.yaml,docker-compose.monitoring.yml,monitoring_start.sh,monitoring_stop.sh,cleanup_docker.sh,deploy_prod_cleanup.sh,monitoring/"
          target: "~/"

      # 6️⃣ SSH & deploy on VPS
      - name: SSH & deploy on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            # ── 🔐 Firebase key (shared between prod and staging) ────────────
            mkdir -p ~/app/firebase
            echo "${{ secrets.FIREBASE_KEY_JSON }}" | base64 -d > ~/app/firebase/firebase_key.json
            chmod 600 ~/app/firebase/firebase_key.json
            echo "✅ Firebase key written to ~/app/firebase/firebase_key.json"

            # ── Write environment-specific env file ──────────────────────────
            if [ "${{ env.ENV }}" = "staging" ]; then
              echo "📝 Writing service.staging.env ..."
              cat <<EOF > ~/service.staging.env
            FIREBASE_KEY_PATH=/app/firebase/firebase_key.json
            FIREBASE_DATABASE_URL=https://ets-1-ccb71-default-rtdb.firebaseio.com
            DATABASE_URL=postgresql://fleetstaging:${{ secrets.STAGING_POSTGRES_PASSWORD || 'stagingpass' }}@postgres_staging:5432/fleet_db_staging
            STAGING_POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD || 'stagingpass' }}
            POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD || 'stagingpass' }}
            REDIS_HOST=redis_staging
            REDIS_PORT=6379
            REDIS_DB=0
            REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD || 'redispassword' }}
            USE_REDIS=1
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            TOKEN_EXPIRY_HOURS=${{ secrets.TOKEN_EXPIRY_HOURS || '1' }}
            TWILIO_ENABLED=${{ secrets.TWILIO_ENABLED || 'false' }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
            TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
            EMAIL_ENABLED=true
            SMTP_SERVER=smtp.gmail.com
            SMTP_PORT=587
            SMTP_USE_TLS=true
            SMTP_USE_SSL=false
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
            SENDER_NAME=Fleet Manager Admin
            SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}
            ENV=staging
            STORAGE_TYPE=filesystem
            PROD_SERVER_STORAGE_PATH=/var/lib/fleet/staging-storage
            MAX_FILE_SIZE_MB=10
            RUN_MIGRATIONS_ON_STARTUP=false
            EOF
              echo "✅ service.staging.env written"
            else
              echo "📝 Writing service.prod.env ..."
              cat <<EOF > ~/service.prod.env
            FIREBASE_KEY_PATH=/app/firebase/firebase_key.json
            FIREBASE_DATABASE_URL=https://ets-1-ccb71-default-rtdb.firebaseio.com
            DATABASE_URL=postgresql://fleetadmin:${{ secrets.POSTGRES_PASSWORD }}@host.docker.internal:5432/fleet_db
            POSTGRES_USER=fleetadmin
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            REDIS_HOST=redis_server
            REDIS_PORT=6379
            REDIS_DB=0
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            USE_REDIS=1
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            TOKEN_EXPIRY_HOURS=${{ secrets.TOKEN_EXPIRY_HOURS || '1' }}
            TWILIO_ENABLED=${{ secrets.TWILIO_ENABLED || 'false' }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}
            TWILIO_VERIFY_SERVICE_SID=${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
            EMAIL_ENABLED=true
            SMTP_SERVER=smtp.gmail.com
            SMTP_PORT=587
            SMTP_USE_TLS=true
            SMTP_USE_SSL=false
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
            SENDER_NAME=Fleet Manager Admin
            SUPPORT_EMAIL=${{ secrets.SUPPORT_EMAIL }}
            ENV=production
            STORAGE_TYPE=${{ secrets.STORAGE_TYPE || 'filesystem' }}
            PROD_SERVER_STORAGE_PATH=${{ secrets.PROD_SERVER_STORAGE_PATH || '/var/lib/fleet/storage' }}
            MAX_FILE_SIZE_MB=${{ secrets.MAX_FILE_SIZE_MB || '10' }}
            EOF
              echo "✅ service.prod.env written"
            fi

            chmod +x ~/*.sh 2>/dev/null || true

            # ── Backup (prod only – staging has its own containerised DB) ────
            if [ "${{ env.ENV }}" = "prod" ]; then
              echo "Creating database backup..."
              mkdir -p ~/backups
              BACKUP_FILE=~/backups/backup_$(date +%Y%m%d_%H%M%S).sql
              sudo -u postgres pg_dump fleet_db > $BACKUP_FILE || {
                echo "⚠️  Warning: Backup failed, continuing deployment"
              }
              echo "Backup saved to: $BACKUP_FILE"
            fi

            # ── Stop running containers (with orphan cleanup) ────────────────
            docker compose --env-file ~/service.${{ env.ENV }}.env -f ~/docker-compose_${{ env.ENV }}.yaml down --remove-orphans 2>/dev/null || true

            # ── Force-remove any containers left over from a failed run ──────
            # This handles the case where a previous deploy failed mid-way and
            # left containers that compose no longer tracks (name conflicts).
            if [ "${{ env.ENV }}" = "staging" ]; then
              for cname in service_manager_staging redis_staging postgres_staging; do
                if docker ps -a --format '{{.Names}}' | grep -q "^${cname}$"; then
                  echo "🧹 Removing leftover container: ${cname}"
                  docker rm -f "${cname}" || true
                fi
              done
            fi

            # ── Optional volume / image cleanup ─────────────────────────────
            if [ "${{ github.event.inputs.remove_volumes }}" = "true" ]; then
              echo "Removing volumes (database will be reset)..."
              docker compose --env-file ~/service.${{ env.ENV }}.env -f ~/docker-compose_${{ env.ENV }}.yaml down -v
              docker volume prune -f
            fi

            if [ "${{ github.event.inputs.remove_images }}" = "true" ]; then
              echo "Removing old images..."
              docker image prune -f
            fi

            # ── Pull the image built for this environment ────────────────────
            docker pull dheerajkumarp/fleet_service_manager:${{ env.IMAGE_TAG }}

            # ── Bring stack up ───────────────────────────────────────────────
            docker compose --env-file ~/service.${{ env.ENV }}.env -f ~/docker-compose_${{ env.ENV }}.yaml up -d

            echo "Waiting for containers to be ready..."
            sleep 10

            # ── Verify migrations ────────────────────────────────────────────
            echo "Verifying migration state after startup..."
            sleep 5
            docker exec ${{ env.CONTAINER_NAME }} python migrate.py current || {
              echo "❌ Could not verify migration state. Container logs:"
            docker compose --env-file ~/service.${{ env.ENV }}.env -f ~/docker-compose_${{ env.ENV }}.yaml logs ${{ env.CONTAINER_NAME }}
              exit 1
            }

            # ── Extra table check for prod only ─────────────────────────────
            if [ "${{ env.ENV }}" = "prod" ]; then
              echo "Verifying database tables..."
              sudo -u postgres psql -d fleet_db -c "\dt" || echo "Could not verify tables"
            fi

            echo "✅ ${{ env.ENV }} deployment completed successfully!"
