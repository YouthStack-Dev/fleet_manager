# ─────────────────────────────────────────────────────────────────────────────
# Staging Stack  –  isolated from prod, runs alongside it on the same VPS
#   App port  : 8300 (prod uses 8100)
#   Redis port: 6380 (prod uses 6379)
#   Postgres  : containerised, port 5433 (prod uses host postgres on 5432)
#
# Runtime secrets come from ~/service.staging.env, written by deploy.yaml
# using GitHub Actions secrets.  NEVER hardcode credentials here.
# ─────────────────────────────────────────────────────────────────────────────

name: fleet-staging

services:

  redis_staging:
    image: redis:7.4-alpine
    container_name: redis_staging
    restart: always
    ports:
      - "6380:6379"
    # Password is sourced from the shell environment (exported by deploy.yaml
    # via `--env-file service.staging.env` before `docker compose up`).
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_staging_data:/data
    networks:
      - fleet-staging-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres_staging:
    image: postgres:15
    container_name: postgres_staging
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fleetstaging
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:-stagingpass}
      POSTGRES_DB: fleet_db_staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - fleet-staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleetstaging -d fleet_db_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate_staging:
    image: dheerajkumarp/fleet_service_manager:staging
    container_name: fleet_migrate_staging
    command: ["alembic", "upgrade", "head"]
    env_file:
      - ./service.staging.env
    depends_on:
      postgres_staging:
        condition: service_healthy
    networks:
      - fleet-staging-network
    restart: "no"

  service_manager_staging:
    image: dheerajkumarp/fleet_service_manager:staging
    container_name: service_manager_staging
    restart: on-failure:3
    # All secrets come from service.staging.env (written by deploy.yaml).
    env_file:
      - ./service.staging.env
    environment:
      # Migrations are handled by the migrate_staging init container above.
      - RUN_MIGRATIONS_ON_STARTUP=false

    volumes:
      # Shared Firebase key (same project used for staging)
      - ./app/firebase/firebase_key.json:/app/app/firebase/firebase_key.json:ro
      # Isolated staging storage — does NOT overlap with prod
      - /var/lib/fleet/staging-storage:/var/lib/fleet/staging-storage

    depends_on:
      redis_staging:
        condition: service_healthy
      postgres_staging:
        condition: service_healthy
      migrate_staging:
        condition: service_completed_successfully
    ports:
      - "8300:8000"
    networks:
      - fleet-staging-network

networks:
  fleet-staging-network:
    driver: bridge

volumes:
  redis_staging_data:
  postgres_staging_data:
