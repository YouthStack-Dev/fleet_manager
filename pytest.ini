[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Asyncio ──────────────────────────────────────────────────────────────────
asyncio_mode = auto

# ── Timeouts (requires pytest-timeout) ───────────────────────────────────────
timeout = 30
timeout_method = thread

# ── Default coverage (run via: pytest --cov) ─────────────────────────────────
addopts =
    --strict-markers
    --tb=short
    -q

# ── Custom markers ────────────────────────────────────────────────────────────
markers =
    unit: Pure function / business-logic tests — no DB, no HTTP
    integration: DB + service interaction tests (SQLite in-memory)
    api: Full HTTP round-trip tests through TestClient
    smoke: Lightweight stability checks; run before every deployment
    regression: Regression gate — all functionality must remain intact
    performance: Performance / load tests (Locust; excluded from standard CI run)
    slow: Tests that take >5 s; skipped in fast-feedback mode

# ── Coverage defaults ─────────────────────────────────────────────────────────
[coverage:run]
source = app, common_utils
omit =
    app/seed/*
    app/firebase/*
    migrations/*
    */__init__.py

[coverage:report]
show_missing = true
fail_under = 70
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
